name: 04 - Power State (Start/Stop)

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Akce (stop = uspání, start = probuzení)'
        type: choice
        options:
          - stop
          - start
        default: 'stop'

permissions:
  id-token: write
  contents: read

env:
  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

jobs:
  power-state:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Toggle AKS State
        run: |
          echo "Provádím ${{ github.event.inputs.action }} pro AKS cluster orbit-aks..."
          # pro AKS pouzijeme --no-wait at na nej nedelame zbytecky lock a pokracujeme k databazi
          az aks ${{ github.event.inputs.action }} --name orbit-aks --resource-group orbit-aks-rg --no-wait

      - name: Toggle PostgreSQL State
        run: |
          echo "Provádím ${{ github.event.inputs.action }} pro PostgreSQL orbit-pg-server..."
          az postgres flexible-server ${{ github.event.inputs.action }} --name orbit-pg-server --resource-group orbit-infra-rg
