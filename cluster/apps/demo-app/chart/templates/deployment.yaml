apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      volumes:
        - name: html-volume
          emptyDir: {}
      containers:
        - name: worker
          image: postgres:15-alpine
          env:
            - name: PGHOST
              value: {{ .Values.dbHost | quote }}
            - name: PGUSER
              value: {{ .Values.appUser | quote }}
            - name: PGDATABASE
              value: {{ .Values.appName | quote }}
            - name: PGSSLMODE
              value: "require"
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-db-init-script
                  key: app_password
          volumeMounts:
            - name: html-volume
              mountPath: /tmp
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              echo "Starting background worker..."
              # Wait for DB to be initialized to prevent hook-race errors
              until psql -c '\q'; do
                echo "Waiting for password replication or DB initialization..."
                sleep 2
              done
              
              # Predvytvoreni tabulky logu
              psql -c "CREATE TABLE IF NOT EXISTS activity_log (id SERIAL PRIMARY KEY, note TEXT, created_at TIMESTAMP DEFAULT NOW());"
              
              while true; do
                htmlFile="/tmp/index.html"
                echo "<!DOCTYPE html><html><head><title>Orbit GitOps Demo</title><style>body { font-family: system-ui; background: #0f172a; color: #f8fafc; padding: 2rem; max-width: 800px; margin: auto; } pre { background: #1e293b; padding: 1rem; border-radius: 8px; }</style></head><body>" > $htmlFile
                echo "<h1>Orbit GitOps Continuous Application</h1>" >> $htmlFile
                echo "<p>Connected Database: $PGDATABASE on Azure Flexible Server</p>" >> $htmlFile
                
                rnd=$RANDOM
                psql -c "INSERT INTO activity_log (note) VALUES ('Automated string generated by worker: $rnd');"
                
                echo "<h2>Live Content (Latest 10 rows):</h2><pre>" >> $htmlFile
                psql -A -t -c "SELECT id, created_at, note FROM activity_log ORDER BY id DESC LIMIT 10;" >> $htmlFile 2>&1
                
                echo "</pre>" >> $htmlFile
                echo "<p style='color:#94a3b8; font-size: 14px;'>Page refreshed dynamically at: $(date)</p>" >> $htmlFile
                echo "</body></html>" >> $htmlFile
                
                sleep 5;
              done
              
        - name: web
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: html-volume
              mountPath: /usr/share/nginx/html
