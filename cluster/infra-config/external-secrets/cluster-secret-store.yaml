apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: default
spec:
  provider:
    azurekv:
      authType: WorkloadIdentity
      tenantId: "${AZURE_TENANT_ID}"
      vaultUrl: "https://${KV_NAME}.vault.azure.net"
      serviceAccountRef:
        name: external-secrets
        namespace: external-secrets
